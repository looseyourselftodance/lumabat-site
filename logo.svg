<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&amp;display=swap');
    </style>
  </defs>

  <!-- Background transparent -->

  <!-- LUMA en clair, BAT en bronze -->
  <text
    x="20" y="72"
    font-family="'Cormorant Garamond', 'Georgia', serif"
    font-size="64"
    font-weight="300"
    letter-spacing="12"
    fill="#2C2C2C">LUMA</text>

  <text
    x="232" y="72"
    font-family="'Cormorant Garamond', 'Georgia', serif"
    font-size="64"
    font-weight="300"
    letter-spacing="12"
    fill="#A0845C">BAT</text>

  <!-- Ligne bronze sous le texte -->
  <line x1="20" y1="84" x2="380" y2="84" stroke="#A0845C" stroke-width="0.8" opacity="0.6"/>

  <!-- Slogan -->
  <text
    x="20" y="104"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="10"
    font-weight="400"
    letter-spacing="5"
    fill="#A0845C"
    opacity="0.9">CONSTRUIRE L'EXCEPTION</text>

</svg>
